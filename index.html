<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Presenca VR - Game Stand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/dseg7-classic" rel="stylesheet">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- Firebase SDK v12 (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    const app = initializeApp({
      apiKey: "AIzaSyALkBD0Zd6uUDDX-mVm2mxI24eCEGBE6gs",
      authDomain: "presenca-game-stand.firebaseapp.com",
      databaseURL: "https://presenca-game-stand-default-rtdb.firebaseio.com",
      projectId: "presenca-game-stand",
      storageBucket: "presenca-game-stand.firebasestorage.app",
      messagingSenderId: "397975465714",
      appId: "1:397975465714:web:8d3c29cd70a7fa46c2aa6b"
    });
    const db = getDatabase(app);
    window._fb = { db, ref, push };
    console.log('[Firebase] VR game conectado.');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0A0A0A;
      color: #fff;
      overflow: hidden;
      touch-action: none;
    }

    /* A-Frame scene always behind everything */
    a-scene { z-index: 0 !important; }

    /* ===== OVERLAY LAYER ===== */
    #overlay-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; pointer-events: none;
    }
    #overlay-layer > div,
    #overlay-layer > button { pointer-events: auto; }

    /* ===== SPLASH SCREEN ===== */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.88);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20000;
    }
    #splash-screen.hidden { display: none; }

    /* ===== MAIN MENU ===== */
    #main-menu {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000;
      pointer-events: none; /* deixa o A-Frame receber eventos de giroscópio */
    }
    #main-menu.hidden { display: none; }
    /* só os filhos diretos recebem cliques */
    #main-menu > * { pointer-events: auto; }

    .menu-logo {
      filter: drop-shadow(0 0 24px rgba(255,139,26,0.5));
      animation: logoFloat 4s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    .menu-subtitle {
      font-size: 13px; color: rgba(255,255,255,0.55);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 48px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .menu-btn {
      display: block; width: 260px; padding: 20px 24px; margin: 10px auto;
      background: linear-gradient(135deg, #FF8B1A 0%, #F05100 100%);
      border: none; border-radius: 16px; color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 20px; font-weight: 800; cursor: pointer;
      text-align: center;
      letter-spacing: 1px;
      box-shadow: 0 8px 32px rgba(240,81,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .menu-btn:hover, .menu-btn:active {
      transform: scale(1.06);
      box-shadow: 0 12px 48px rgba(255,139,26,0.7), 0 2px 8px rgba(0,0,0,0.4);
    }
    .menu-btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,139,26,0.4);
      font-size: 16px;
      padding: 16px 24px;
    }
    .menu-btn.secondary:hover, .menu-btn.secondary:active {
      background: rgba(255,139,26,0.15);
    }
    .menu-footer {
      position: absolute; bottom: 28px; text-align: center;
      font-size: 11px; color: #ffffff;
      letter-spacing: 1px;
    }
    .menu-footer span { color: #FF8B1A; }

    /* ===== INTRO OVERLAY ===== */
    #intro-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: transparent; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 10002; text-align: center; padding: 20px;
      pointer-events: none;
    }
    #intro-overlay.active { display: flex; }
    #intro-countdown {
      font-size: 120px; font-weight: 900; color: #fff;
      text-shadow: 0 0 30px rgba(255,139,26,1), 0 0 80px rgba(255,139,26,0.6), 0 4px 16px rgba(0,0,0,0.9);
      min-height: 140px; line-height: 1;
    }
    #intro-text { display: none; }

    /* ===== HUD ===== */
    #game-hud {
      position: fixed; top: 0; left: 0; width: 100%;
      z-index: 9998; display: none;
      flex-direction: column; align-items: center;
      pointer-events: none; padding-top: 18px;
    }
    #game-hud.active { display: flex; }

    /* Timer - DSEG7 digital font, neon orange */
    #hud-timer {
      font-family: 'DSEG7 Classic', 'Courier New', monospace;
      font-size: 52px; font-weight: 700;
      color: #FF8B1A;
      text-shadow:
        0 0 6px #FF8B1A,
        0 0 12px #FF8B1A,
        0 0 25px rgba(255,139,26,0.7),
        0 0 50px rgba(255,139,26,0.3);
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 8px;
    }

    /* Lives - below timer, no background */
    #hud-center-info {
      font-size: 24px;
      line-height: 1;
      margin-bottom: 4px;
    }

    /* Score - bottom center, neon orange */
    #hud-score {
      display: none;
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-family: 'Poppins', sans-serif;
      font-size: 28px; font-weight: 700;
      color: #FF8B1A;
      text-shadow:
        0 0 8px #FF8B1A,
        0 0 20px rgba(255,139,26,0.6),
        0 0 40px rgba(255,139,26,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #hud-score.active { display: block; }

    .hud-progress {
      font-family: 'Poppins', sans-serif;
      color: #FFB800; font-size: 16px; font-weight: 600;
    }

    /* ===== TOUCH ZONE (Game 2 - tap to hit) ===== */
    #touch-hit-zone {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; z-index: 9996;
    }
    #touch-hit-zone.active { display: block; }

    /* ===== RESULT SCREEN ===== */
    #result-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: transparent; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 10003; text-align: center; padding: 20px; pointer-events: none;
    }
    #result-screen.active { display: flex; }
    #result-screen > * { pointer-events: auto; }

    .result-title {
      font-size: 22px; font-weight: 700; color: #FF8B1A; margin-bottom: 8px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.9);
    }
    .result-score {
      font-size: 80px; font-weight: 900; color: #fff; line-height: 1;
      text-shadow: 0 0 40px rgba(255,139,26,0.8), 0 4px 24px rgba(0,0,0,1);
      margin-bottom: 4px;
    }
    .result-detail {
      font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }
    .result-btn {
      display: inline-block; padding: 14px 28px; margin: 6px;
      background: linear-gradient(135deg, #FF8B1A 0%, #F05100 100%);
      border: none; border-radius: 12px; color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(240,81,0,0.5), 0 2px 8px rgba(0,0,0,0.6);
    }
    .result-btn.secondary {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ===== RANKING SCREEN ===== */
    #ranking-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.97); display: none;
      flex-direction: column; align-items: center;
      z-index: 10004; padding: 20px; overflow-y: auto;
    }
    #ranking-screen.active { display: flex; }
    .ranking-title { font-size: 24px; font-weight: 900; color: #FF8B1A; margin: 15px 0; }
    .ranking-table { width: 100%; max-width: 500px; }
    .ranking-row {
      display: flex; padding: 10px 12px; border-bottom: 1px solid #1a1a1a;
      align-items: center; font-size: 13px;
    }
    .ranking-row.header { color: #888; font-weight: 700; border-bottom: 1px solid #333; }
    .ranking-pos { width: 30px; color: #FF8B1A; font-weight: 700; }
    .ranking-name { flex: 1; }
    .ranking-score { width: 70px; text-align: right; color: #FF8B1A; font-weight: 700; }
    .ranking-time { width: 50px; text-align: right; color: #888; }

    .ranking-export {
      margin-top: 15px; padding: 10px 20px;
      background: rgba(255,255,255,0.1); border: 1px solid #333;
      border-radius: 8px; color: #888; cursor: pointer; font-size: 12px;
    }
    .ranking-close {
      margin-top: 10px; padding: 10px 24px;
      background: #FF8B1A; border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-size: 14px; font-weight: 700;
    }

    /* ===== CROSSHAIR ===== */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9997; pointer-events: none; display: none;
      transition: transform 0.1s;
    }
    #crosshair.active { display: block; }
    #crosshair.on-target { transform: translate(-50%, -50%) scale(1.35); }
    #crosshair.on-target .ch-ring { stroke: #FF8B1A; opacity: 1; }
    #crosshair.on-target .ch-line { stroke: #FF8B1A; }
    #crosshair.on-target .ch-dot  { fill: #FF8B1A; }

    /* ===== NARRATION SUBTITLE ===== */
    #narration-sub {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, 60px);
      z-index: 10005; text-align: center;
      font-size: 22px; font-weight: 700; color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,1), 0 0 60px rgba(0,0,0,0.95);
      max-width: 78%; line-height: 1.5;
      pointer-events: none; display: none; letter-spacing: 0.3px;
      opacity: 0;
      transition: opacity 0.45s ease;
    }
    #narration-sub.active { display: block; }
    #narration-sub.visible { opacity: 1; }

    /* ===== GAME 2 HIT FEEDBACK ===== */
    #hit-feedback {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 9997; pointer-events: none; display: none;
      font-size: 48px; font-weight: 900; color: #FFB800;
      text-shadow: 0 0 30px rgba(255,184,0,0.8);
    }

    /* ===== FADE OVERLAY ===== */
    #fade-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; opacity: 0; pointer-events: none !important;
      z-index: 19999; transition: opacity 1.5s ease;
    }
    #fade-overlay.fading { opacity: 1; }
    #fade-overlay.visible { opacity: 1; pointer-events: all !important; }

    /* ===== GAZE RING ===== */
    #gaze-ring {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9997; pointer-events: none !important;
      display: none;
    }
    #gaze-ring.active { display: block; }

    /* ===== MINE HINT ===== */
    #mine-hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,139,26,0.8);
      box-shadow: 0 0 12px 4px rgba(255,139,26,0.5);
      z-index: 9996; pointer-events: none !important;
      display: none;
      animation: mineHintPulse 1.4s ease-in-out infinite;
    }
    #mine-hint.active { display: block; }
    @keyframes mineHintPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.4; }
    }

    /* Hide A-Frame UI */
    .a-enter-vr { display: none !important; }

    /* ===== VR ENTER BUTTON ===== */
    #vr-enter-btn {
      position: fixed; bottom: 15px; right: 15px; z-index: 10001;
      background: linear-gradient(135deg, #FF8B1A, #F05100);
      border: none; border-radius: 50%; width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 14px; font-weight: 700;
      box-shadow: 0 4px 16px rgba(240,81,0,0.5);
      font-family: 'Poppins', sans-serif;
    }
    /* ===== VR MODE ===== */
    /* Só esconde navegação específica do modo 2D */
    body.vr-mode #vr-enter-btn,
    body.vr-mode #ranking-screen,
    body.vr-mode #touch-hit-zone { display: none !important; }
    /*
     * overlay-layer em VR: width 50% + transform (torna containing block para
     * os filhos position:fixed). Assim todos os elementos centrados (left:50%)
     * caem no centro do olho esquerdo (25% da tela). O espelho JS cobre o olho direito.
     */
    body.vr-mode #overlay-layer {
      transform: translate(0, 0);
      width: 50%;
      overflow: hidden;
    }
    /* Escalas de fonte reduzidas para caberem no olho (50% da largura) */
    body.vr-mode #splash-screen img  { width: 110px !important; margin-bottom: 14px !important; }
    body.vr-mode #splash-btn         { width: 180px !important; font-size: 13px !important; padding: 12px 16px !important; }
    body.vr-mode .menu-logo          { width: 140px !important; margin-bottom: 8px !important; }
    body.vr-mode .menu-subtitle      { font-size: 10px !important; margin-bottom: 20px !important; letter-spacing: 1px !important; }
    body.vr-mode .menu-btn           { width: 180px !important; font-size: 14px !important; padding: 12px 16px !important; margin: 6px auto !important; border-radius: 10px !important; }
    body.vr-mode .menu-footer        { font-size: 9px !important; bottom: 12px !important; }
    body.vr-mode #intro-countdown    { font-size: 64px !important; min-height: 72px !important; }
    body.vr-mode #hud-timer          { font-size: 30px !important; letter-spacing: 2px !important; }
    body.vr-mode #hud-score          { font-size: 16px !important; bottom: 14px !important; letter-spacing: 1px !important; }
    body.vr-mode #hud-center-info    { font-size: 14px !important; }
    body.vr-mode #narration-sub      { font-size: 14px !important; max-width: 88% !important; line-height: 1.4 !important; }
    body.vr-mode #hit-feedback       { font-size: 28px !important; }
    body.vr-mode .result-title       { font-size: 14px !important; }
    body.vr-mode .result-score       { font-size: 52px !important; }
    body.vr-mode .result-detail      { font-size: 10px !important; margin-bottom: 18px !important; }
    body.vr-mode .result-btn         { font-size: 12px !important; padding: 10px 18px !important; margin: 4px !important; border-radius: 8px !important; }
    body.vr-mode #crosshair svg      { width: 32px !important; height: 32px !important; }
    body.vr-mode #gaze-ring svg      { width: 50px !important; height: 50px !important; }
    /* UI dedicada ao modo VR — fica por cima de tudo */
    #vr-ui {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 99999; pointer-events: none;
    }
    body.vr-mode #vr-ui { display: block; }
    /* Botão sair VR — visível em ambos os olhos (centro-cima) */
    #vr-exit-btn {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); border: 2px solid rgba(255,139,26,0.8);
      border-radius: 20px; color: #FF8B1A; font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700; padding: 7px 18px;
      pointer-events: auto; cursor: pointer; letter-spacing: 1px;
      z-index: 100001; /* acima do vr-hit-zone */
    }
    /* Área de toque invisível — cobre tela toda em VR para registrar golpes */
    #vr-hit-zone {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; background: transparent;
    }
    /* Só recebe toques quando o jogo está ativo (fase 2) — liberando cliques
       em botões de menu/splash/resultado nas outras telas */
    body.vr-mode.game-active #vr-hit-zone { pointer-events: auto; }
    /* HUD mínimo VR — placar e tempo flutuando no centro */
    #vr-hud {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -85px);
      text-align: center; pointer-events: none;
      display: none;
    }
    body.vr-mode.game-active #vr-hud { display: block; }
    #vr-hud-score {
      font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 900;
      color: #FF8B1A; text-shadow: 0 0 12px rgba(255,139,26,0.8), 0 2px 8px rgba(0,0,0,1);
    }
    #vr-hud-timer {
      font-family: 'DSEG7 Classic', monospace; font-size: 18px; color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.5), 0 2px 8px rgba(0,0,0,1);
    }
  </style>
</head>
<body>

<!-- ===== OVERLAY LAYER ===== -->
<div id="overlay-layer">

  <!-- SPLASH: pede permissão do giroscópio antes de tudo -->
  <div id="splash-screen">
    <img src="assets/logo-branco.png" alt="Presenca" style="width:200px;height:auto;margin-bottom:28px;filter:drop-shadow(0 0 24px rgba(255,139,26,0.5));">
    <div style="font-size:15px;color:rgba(255,255,255,0.7);margin-bottom:8px;letter-spacing:1px;">Workshop Corban360</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:48px;">16 e 17 de Abril, 2026</div>
    <button id="splash-btn" class="menu-btn" onclick="requestGyroAndEnter()" style="width:280px;font-size:18px;">
      🎮 Toque para Jogar
    </button>
    <div style="margin-top:20px;font-size:11px;color:rgba(255,255,255,0.3);max-width:240px;text-align:center;line-height:1.6;">
      Será solicitada permissão para o sensor de movimento do dispositivo
    </div>
  </div>

  <!-- MAIN MENU -->
  <div id="main-menu" class="hidden">
    <img class="menu-logo" src="assets/logo-branco.png" alt="Presenca" style="width:240px;height:auto;margin-bottom:12px;">
    <div class="menu-subtitle">O futuro do consignado é com Presença</div>

    <button class="menu-btn" onclick="startGame()">Iniciar Partida</button>

    <div class="menu-footer">
      Workshop Corban360 — 16 e 17 de Abril, 2026
      <div style="display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px;font-size:10px;color:#FF8B1A;letter-spacing:0.3px;">
        Desenvolvido por <img src="assets/logo-laranja-zbrand.png" alt="ZBrand" style="height:13px;width:auto;vertical-align:middle;">
      </div>
    </div>
  </div>

  <!-- INTRO OVERLAY -->
  <div id="intro-overlay">
    <div id="intro-countdown"></div>
    <div id="intro-text"></div>
  </div>

  <!-- GAME HUD -->
  <div id="game-hud">
    <div id="hud-timer">00:40</div>
    <div id="hud-center-info"></div>
  </div>
  <div id="hud-score">0 pts</div>

  <!-- CROSSHAIR (mira) -->
  <div id="crosshair">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="3" class="ch-dot" fill="white"/>
      <circle cx="24" cy="24" r="12" class="ch-ring" stroke="white" stroke-width="1" opacity="0.45"/>
      <line x1="24" y1="4"  x2="24" y2="15" class="ch-line" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="24" y1="33" x2="24" y2="44" class="ch-line" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="4"  y1="24" x2="15" y2="24" class="ch-line" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="33" y1="24" x2="44" y2="24" class="ch-line" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- NARRATION SUBTITLE -->
  <div id="narration-sub"></div>

  <!-- GAZE RING (fills during mine entrance gaze dwell) -->
  <div id="gaze-ring">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,139,26,0.25)" stroke-width="3"/>
      <circle id="gaze-ring-fill" cx="36" cy="36" r="28" fill="none" stroke="#FF8B1A" stroke-width="3"
        stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round"
        transform="rotate(-90 36 36)"/>
    </svg>
  </div>

  <!-- MINE ENTRANCE HINT (pulsing dot to guide player) -->
  <div id="mine-hint"></div>

  <!-- TOUCH HIT ZONE (Game 2 fallback) -->
  <div id="touch-hit-zone" ontouchstart="handleTouchHit()" onclick="handleTouchHit()"></div>

  <!-- HIT FEEDBACK (Game 2) -->
  <div id="hit-feedback">CRACK!</div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div class="result-title" id="result-title">Parabéns!</div>
    <div class="result-score" id="result-score-value">0</div>
    <div class="result-detail" id="result-detail"></div>
    <div style="margin-top: 12px;">
      <button class="result-btn" onclick="playAgain()">Jogar Novamente</button>
    </div>
  </div>

  <!-- RANKING SCREEN -->
  <div id="ranking-screen">

    if (p && p.catch) p.catch(() => { if (onEnded) onEnded(); });

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    ctx.resume();
    window._audioCtxUnlocked = true;

  // Inicializa vídeo mudo (wake lock fallback iOS) — deve ser dentro de gesto do usuário

function requestWakeLock() {
  // 1. Vídeo mudo em loop — fallback universal (iOS Safari < 16.4, WebViews antigas)
  try { if (_noSleepVid) _noSleepVid.play().catch(() => {}); } catch(e) {}
  // 2. API nativa Wake Lock — Chrome Android, iOS Safari 16.4+ (sem pop-up de permissão,
  //    mas exige gesto do usuário). Mantém a tela acesa como quando se assiste vídeo.
  if ('wakeLock' in navigator && !_wakeLock) {
    navigator.wakeLock.request('screen')
      .then(sentinel => {
        _wakeLock = sentinel;
        _wakeLock.addEventListener('release', () => { _wakeLock = null; });
      })
      .catch(err => console.warn('[WakeLock] request failed:', err && err.message));
  }
}

function releaseWakeLock() {
  try { if (_noSleepVid) _noSleepVid.pause(); } catch(e) {}
  if (_wakeLock) {
    try { _wakeLock.release(); } catch(e) {}
    _wakeLock = null;
  }
}

// ===== WEB AUDIO =====
let audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playHitSound() {
  ensureAudioCtx();
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(70, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.35, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}
function playShatterSound() {
  ensureAudioCtx();
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*0.45), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 1.2);
  const src = audioCtx.createBufferSource(), filt = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
  filt.type = 'bandpass'; filt.frequency.value = 900; filt.Q.value = 0.6;
  g.gain.setValueAtTime(0.9, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
  src.buffer = buf; src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + 0.45);
}
function playWhooshSound() {
  ensureAudioCtx();
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(500, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.25);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  osc.start(); osc.stop(audioCtx.currentTime + 0.35);
}

// Posição de descanso da picareta — deve bater com os atributos do HTML
const PICK_REST_ROT  = '-15 150 20';
const PICK_STRIKE_ROT = '60 150 20'; // lâmina vai para frente (X +75°)
const PICK_REST_POS  = '0.52 -2.0 -0.38';
const PICK_STRIKE_POS = '0.52 -1.9 -0.48'; // sobe e avança levemente

function swingPickaxe() {
  const p = $('picareta-fp');
  // Remove animações anteriores para reiniciar limpo
  p.removeAttribute('animation__swingRot');
  p.removeAttribute('animation__returnRot');
  p.removeAttribute('animation__swingPos');
  p.removeAttribute('animation__returnPos');

  setTimeout(() => {
    // STRIKE: lâmina avança para frente em 130ms (impacto rápido)
    p.setAttribute('animation__swingRot',
      `property: rotation; from: ${PICK_REST_ROT}; to: ${PICK_STRIKE_ROT}; dur: 130; easing: easeInCubic`);
    p.setAttribute('animation__swingPos',
      `property: position; from: ${PICK_REST_POS}; to: ${PICK_STRIKE_POS}; dur: 130; easing: easeInCubic`);
    // RETURN: volta ao descanso suavemente após 130ms
    p.setAttribute('animation__returnRot',
      `property: rotation; from: ${PICK_STRIKE_ROT}; to: ${PICK_REST_ROT}; dur: 300; delay: 130; easing: easeOutBack`);
    p.setAttribute('animation__returnPos',
      `property: position; from: ${PICK_STRIKE_POS}; to: ${PICK_REST_POS}; dur: 300; delay: 130; easing: easeOutCubic`);
  }, 0);
}

// ===== GAMEPAD (VR Shinecon SC-B03 / controles Bluetooth HID) =====

  // Golpe durante o jogo
  if (gameActive) { handleTouchHit(); return; }
  // Jogar novamente na tela de resultado
  if (resultScreen && resultScreen.classList.contains('active')) { playAgain(); return; }
  // Iniciar partida no menu principal (se já passou do splash)
  if (mainMenu && !mainMenu.classList.contains('hidden')) { startGame(); return; }
}
function _gamepadPoll() {
  try {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (const gp of pads) {
      if (!gp) continue;
      const prev = _gamepadPrev[gp.index] || [];
      const cur  = [];
      for (let i = 0; i < gp.buttons.length; i++) {
        const pressed = !!(gp.buttons[i] && gp.buttons[i].pressed);
        cur.push(pressed);
        if (pressed && !prev[i]) _gamepadAction();
      }
      _gamepadPrev[gp.index] = cur;
    }
  } catch(err) {}
  _gamepadRAF = requestAnimationFrame(_gamepadPoll);
}
function _startGamepadPolling() {
  if (_gamepadRAF) return;
  _gamepadRAF = requestAnimationFrame(_gamepadPoll);
}
window.addEventListener('gamepadconnected', _startGamepadPolling);
// Dá partida mesmo se o gamepad já estiver conectado antes do load
_startGamepadPolling();

// No iOS, o Shinecon SC-B03 em Modo Jogo (⊙+X) usa protocolo iCade, que envia
// caracteres de teclado para cada botão (ex: ⊙→'y'/'t', A→'h'/'r', X→'j'/'p').
// Em Modo Player (⊙+A) envia media keys. Cobrimos tudo via keydown capture.
let _lastKeyActionAt = 0;
window.addEventListener('keydown', (e) => {
  // Ignora se um input/textarea está focado (evita conflito com campo de texto)
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  // Ignora modificadores de teclado normal
  if (e.altKey || e.ctrlKey || e.metaKey) return;
  // Debounce 250ms para cobrir keyrepeat e iCade up/down pairs
  const now = Date.now();
  if (now - _lastKeyActionAt < 250) return;
  _lastKeyActionAt = now;
  try { _gamepadAction(); } catch(err) {}
  try { e.preventDefault(); } catch(err) {}
}, true);

function handleTouchHit() {
  if (!gameActive || hitCooldown) return;
  const target = geoGazeTarget;
  if (!target) return;
  hitCooldown = true;
  swingPickaxe();
  setTimeout(() => { registerGeoHit(target); }, 250);
  setTimeout(() => { hitCooldown = false; }, 500);
}

function createCosmosSkyTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 2048; canvas.height = 1024;
  const ctx = canvas.getContext('2d');
  // Deep space gradient
  const grad = ctx.createLinearGradient(0, 0, 0, 1024);
  grad.addColorStop(0,   '#0A0200');
  grad.addColorStop(0.3, '#1A0800');
  grad.addColorStop(0.6, '#2A1000');
  grad.addColorStop(1,   '#050100');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 2048, 1024);
  // Stars
  for (let i = 0; i < 700; i++) {
    const x = Math.random() * 2048, y = Math.random() * 1024;
    const r = Math.random() * 1.2 + 0.3;
    const alpha = 0.5 + Math.random() * 0.5;
    ctx.fillStyle = `rgba(255,${200 + Math.floor(Math.random()*55)},${150 + Math.floor(Math.random()*80)},${alpha})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }
  // Subtle orange nebula cloud
  const neb = ctx.createRadialGradient(1024, 400, 0, 1024, 400, 600);
  neb.addColorStop(0,   'rgba(255,100,0,0.12)');
  neb.addColorStop(0.5, 'rgba(255,60,0,0.06)');
  neb.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = neb;
  ctx.fillRect(0, 0, 2048, 1024);
  return canvas.toDataURL();
}

// ===== PHRASE-BY-PHRASE SUBTITLE ENGINE =====
// Displays an array of phrases one at a time with fade in/out animation.
// Each phrase stays visible for `durationMs`, then fades out before the next.
// Calls `onDone` after all phrases are shown.
function playPhrases(el, phrases, durationMs, onDone) {
  el.classList.add('active');
  let i = 0;
  const FADE = 450; // ms — matches CSS transition

  function showNext() {
    if (i >= phrases.length) {
      hidePhrases(el);
      if (onDone) setTimeout(onDone, FADE);
      return;
    }
    // Fade in
    el.textContent = phrases[i].replace(/\\n/g, '\n');
    el.style.whiteSpace = 'pre-line';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { el.classList.add('visible'); });
    });
    // Wait, then fade out and show next
    setTimeout(() => {
      el.classList.remove('visible');
      i++;
      setTimeout(showNext, FADE);
    }, durationMs);
  }

  showNext();
}

function hidePhrases(el) {
  el.classList.remove('visible');
  setTimeout(() => {
    el.classList.remove('active');
    el.textContent = '';
  }, 450);
}

// Calculates mine entrance position in 3D space
function getMineEntrancePos() {
  const rad = (MINE_ENTRANCE_ANGLE * Math.PI) / 180;
  return {
    x: Math.sin(rad) * MINE_ENTRANCE_DIST,
    y: MINE_ENTRANCE_HEIGHT,
    z: -Math.cos(rad) * MINE_ENTRANCE_DIST
  };
}

function startMineGazeDwell() {
  mineHint.classList.add('active');
  gazeRing.classList.add('active');
  mineGazeStartTime = null;

  const camera = document.getElementById('main-camera');
  const minePos = getMineEntrancePos();
  const GAZE_CONE = 0.35; // ~20° cone

  function checkMineGaze() {
    if (!mineGazeRAF) return; // stopped

    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.object3D.quaternion);
    const camPos = new THREE.Vector3();
    camera.object3D.getWorldPosition(camPos);

    const toMine = new THREE.Vector3(
      minePos.x - camPos.x,
      minePos.y - camPos.y,
      minePos.z - camPos.z
    ).normalize();
    const angle = dir.angleTo(toMine);

    if (angle < GAZE_CONE) {
      // Player is looking at mine entrance
      if (!mineGazeStartTime) mineGazeStartTime = Date.now();
      const elapsed = Date.now() - mineGazeStartTime;
      const progress = Math.min(elapsed / MINE_GAZE_DWELL_MS, 1);

      // Update ring fill (stroke-dashoffset: 175.9 = empty, 0 = full)
      const dashOffset = 175.9 * (1 - progress);
      const _fill1 = document.getElementById('gaze-ring-fill'); if (_fill1) _fill1.setAttribute('stroke-dashoffset', dashOffset.toFixed(1));

      if (elapsed >= MINE_GAZE_DWELL_MS) {
        // Dwell complete — trigger transition
        stopMineGazeDwell();
        triggerMineTransition();
        return;
      }
    } else {
      // Not looking — reset
      mineGazeStartTime = null;
      const _fill2 = document.getElementById('gaze-ring-fill'); if (_fill2) _fill2.setAttribute('stroke-dashoffset', '175.9');
    }

    mineGazeRAF = requestAnimationFrame(checkMineGaze);
  }
  mineGazeRAF = requestAnimationFrame(checkMineGaze);
}

function stopMineGazeDwell() {
  if (mineGazeRAF) { cancelAnimationFrame(mineGazeRAF); mineGazeRAF = null; }
  mineHint.classList.remove('active');
  gazeRing.classList.remove('active');
  const _fill2 = document.getElementById('gaze-ring-fill'); if (_fill2) _fill2.setAttribute('stroke-dashoffset', '175.9');
  mineGazeStartTime = null;
}

function triggerMineTransition() {

}

function spawnGeode() {
  cleanupGeoWords(); // garante limpeza antes de spawnar novo set

  const container = document.getElementById('geode-container');
  while (container.firstChild) container.removeChild(container.firstChild);
  geoPanels = [];

  // TextureLoader é mais confiável que new THREE.Texture(imgEl) — aguarda decode
  const rockTex = new THREE.TextureLoader().load('assets/rocha.jpg');
  rockTex.wrapS = THREE.RepeatWrapping;
  rockTex.wrapT = THREE.RepeatWrapping;
  rockTex.repeat.set(1.5, 1.5); // repete levemente para cobrir o triângulo com mais detalhe
  rockTex.encoding = THREE.sRGBEncoding;

  // IcosahedronGeometry detail=0 → 20 triangular faces
  const sphereGeo = new THREE.IcosahedronGeometry(5.0, 0);
  const nonIdx = sphereGeo.toNonIndexed();
  const pos = nonIdx.attributes.position;
  const numFaces = pos.count / 3;

  // Decide which faces get words (those above floor, randomly assigned)
  const wordPool2 = ROCK_WORDS.map((w, i) => i);
  for (let i = wordPool2.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wordPool2[i], wordPool2[j]] = [wordPool2[j], wordPool2[i]];
  }

  let wordIdx = 0;

  for (let i = 0; i < numFaces; i++) {
    const verts3 = [];
    for (let j = 0; j < 3; j++) {
      verts3.push(new THREE.Vector3(pos.getX(i*3+j), pos.getY(i*3+j), pos.getZ(i*3+j)));
    }
    const centroid = new THREE.Vector3(
      (verts3[0].x + verts3[1].x + verts3[2].x) / 3,
      (verts3[0].y + verts3[1].y + verts3[2].y) / 3,
      (verts3[0].z + verts3[1].z + verts3[2].z) / 3
    );

    // Skip floor panels (below player feet level)
    if (centroid.y < -3.0) continue;

    // Assign word to first 9 valid panels
    const hasWord = wordIdx < ROCK_WORDS.length;
    const word = hasWord ? ROCK_WORDS[wordPool2[wordIdx]] : null;
    if (hasWord) wordIdx++;

    // Triangle geometry (BackSide = player sees inside face)
    const triGeo = new THREE.BufferGeometry();
    const v = new Float32Array([
      verts3[0].x, verts3[0].y, verts3[0].z,
      verts3[1].x, verts3[1].y, verts3[1].z,
      verts3[2].x, verts3[2].y, verts3[2].z,
    ]);
    triGeo.setAttribute('position', new THREE.BufferAttribute(v, 3));
    // UV: mapeamento triângulo estático 0,0 / 1,0 / 0.5,1
    triGeo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array([0,0, 1,0, 0.5,1]), 2));
    triGeo.computeVertexNormals();

    // Material com textura de rocha; word panels têm leve tint dourado por cima
    const mat = new THREE.MeshStandardMaterial({
      map: rockTex,
      color: hasWord ? 0xBB9A60 : 0xFFFFFF, // tint multiplicativo — dourado vs neutro
      roughness: 0.92, metalness: hasWord ? 0.18 : 0.04,
      flatShading: false, side: THREE.BackSide
    });
    const mesh = new THREE.Mesh(triGeo, mat);

    // Geodesic wireframe edges (orange glow for word panels)
    const edges = new THREE.EdgesGeometry(triGeo);
    const edgeMat = new THREE.LineBasicMaterial({
      color: hasWord ? 0xFF8B1A : 0x3A2A12,
      transparent: true, opacity: hasWord ? 0.55 : 0.25
    });
    mesh.add(new THREE.LineSegments(edges, edgeMat));

    const el = document.createElement('a-entity');
    el.setObject3D('panel-mesh', mesh);
    container.appendChild(el);

    geoPanels.push({
      el, mesh, centroid,
      word, hasWord,
      hitsLeft: hasWord ? (word.hits) : 1,
      alive: true,
      panelIdx: geoPanels.length
    });
  }
}

let geoGazeActive = false;

function startGeoGazeLoop() {
  geoGazeActive = true;
  const camera = document.getElementById('main-camera');
  const GEO_GAZE_ANGLE = 0.30;

  function loop() {
    if (!geoGazeActive) return; // usa flag própria, independente de gameActive
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.object3D.quaternion);
    const camPos = new THREE.Vector3();
    camera.object3D.getWorldPosition(camPos);

    let best = null, bestAngle = GEO_GAZE_ANGLE;
    geoPanels.forEach(panel => {
      if (!panel.alive) return;
      const toPanel = new THREE.Vector3(
        panel.centroid.x - camPos.x,
        panel.centroid.y - camPos.y,
        panel.centroid.z - camPos.z
      ).normalize();
      const angle = dir.angleTo(toPanel);
      if (angle < bestAngle) { bestAngle = angle; best = panel; }
    });

    geoGazeTarget = best;
    if (best) crosshairEl.classList.add('on-target');
    else      crosshairEl.classList.remove('on-target');

    geoGazingRAF = requestAnimationFrame(loop);
  }
  geoGazingRAF = requestAnimationFrame(loop);
}

function stopGeoGazeLoop() {
  geoGazeActive = false;
  geoGazeTarget = null;
  if (geoGazingRAF) { cancelAnimationFrame(geoGazingRAF); geoGazingRAF = null; }
}

function registerGeoHit(panel) {
  if (!gameActive || !panel || !panel.alive) return;
  panel.hitsLeft--;

  if (panel.hitsLeft <= 0) {
    shatterPanel(panel);
  } else {
    playHitSound();
    // Shake the panel visually
    const orig = panel.mesh.position.clone();
    let n = 0;
    const iv = setInterval(() => {
      panel.mesh.position.set(
        orig.x + (Math.random()-0.5)*0.08,
        orig.y + (Math.random()-0.5)*0.05,
        orig.z + (Math.random()-0.5)*0.08
      );
      if (++n >= 6) { clearInterval(iv); panel.mesh.position.copy(orig); }
    }, 25);
    showHitFeedback();
  }
}

function shatterPanel(panel) {
  panel.alive = false;
  const c = panel.centroid;
  const scene = document.querySelector('a-scene');

  // Direction from panel centroid TOWARD player (0,1.6,0)
  const toPlayer = new THREE.Vector3(-c.x, 1.6 - c.y, -c.z).normalize();

  // Golden particles fly TOWARD player
  for (let i = 0; i < 10; i++) {
    const sz = (0.04 + Math.random() * 0.07).toFixed(3);
    const spread = 0.6;
    const dist = 2.5 + Math.random() * 1.5;
    const fx = (c.x + toPlayer.x * dist + (Math.random()-0.5)*spread).toFixed(2);
    const fy = (c.y + toPlayer.y * dist + (Math.random()-0.5)*spread).toFixed(2);
    const fz = (c.z + toPlayer.z * dist + (Math.random()-0.5)*spread).toFixed(2);

    const frag = document.createElement('a-box');
    frag.setAttribute('width', sz); frag.setAttribute('height', sz); frag.setAttribute('depth', sz);
    frag.setAttribute('position', `${c.x.toFixed(2)} ${c.y.toFixed(2)} ${c.z.toFixed(2)}`);
    frag.setAttribute('color', '#FFB800');
    frag.setAttribute('material', 'roughness: 0.3; metalness: 0.7; emissive: #FF8800; emissiveIntensity: 0.4');
    scene.appendChild(frag);

    setTimeout(() => {
      frag.setAttribute('animation__fly',    `property: position; to: ${fx} ${fy} ${fz}; dur: 480; easing: easeOutQuad`);
      frag.setAttribute('animation__shrink', `property: scale; to: 0.001 0.001 0.001; dur: 420; delay: 60; easing: easeInQuad`);
    }, 0);
    setTimeout(() => { if (frag.parentNode) frag.parentNode.removeChild(frag); }, 620);
  }

  // Remove panel mesh (creates natural hole showing skybox)
  panel.el.removeObject3D('panel-mesh');
  if (panel.el.parentNode) panel.el.parentNode.removeChild(panel.el);

  playShatterSound();

  // Score
  score += panel.hasWord ? (panel.word.pts) : 50;
  if (timeRemaining > 20) score += 50;
  else if (timeRemaining > 10) score += 25;

  if (panel.hasWord) {
    geoWordsRevealed++;
    revealGeoWord(panel);
    playWhooshSound();
  }

  updateGeoLighting();
  updateHUD();
  showHitFeedback();
}

function revealGeoWord(panel) {
  const c = panel.centroid;

  // Posição: levemente para dentro do centro da geoda
  const inward = new THREE.Vector3(-c.x, -c.y, -c.z).normalize().multiplyScalar(0.9);
  const wx = parseFloat((c.x + inward.x).toFixed(2));
  const wy = parseFloat((c.y + inward.y).toFixed(2));
  const wz = parseFloat((c.z + inward.z).toFixed(2));

  // Ângulo para o texto encarar o centro (player) — +180° inverte a face do plano
  const angle = Math.atan2(c.x, c.z) * 180 / Math.PI + 180;

  // === Canvas texture com Poppins + glow laranja ===
  const lines = panel.word.word.split('\n');
  const fontSize = 52;
  const lineH = fontSize + 10;
  const padding = 28;
  const canvasW = 512;
  const canvasH = lineH * lines.length + padding * 2;

  const cvs = document.createElement('canvas');
  cvs.width = canvasW; cvs.height = canvasH;
  const ctx = cvs.getContext('2d');

  // Fundo transparente
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Glow laranja
  ctx.shadowColor = '#FF8B1A';
  ctx.shadowBlur = 22;

  // Texto branco, Poppins Bold
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `700 ${fontSize}px Poppins, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  lines.forEach((line, i) => {
    const y = padding + lineH * i + lineH / 2;
    // Glow em 3 passes para reforçar
    for (let g = 0; g < 3; g++) ctx.fillText(line, canvasW / 2, y);
  });

  const tex = new THREE.CanvasTexture(cvs);
  const aspect = canvasW / canvasH;
  const planeH = 0.55;
  const planeW = planeH * aspect;

  const geo = new THREE.PlaneGeometry(planeW, planeH);
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);

  // Posição e rotação
  mesh.position.set(wx, wy, wz);
  mesh.rotation.y = angle * Math.PI / 180;
  mesh.scale.set(0.01, 0.01, 0.01); // começa micro, cresce

  const scene = document.querySelector('a-scene');
  scene.object3D.add(mesh);

  // Animação de aparecimento (scale)
  const tStart = performance.now();
  const DUR_GROW = 420;
  function growAnim(t) {
    const prog = Math.min((t - tStart) / DUR_GROW, 1);
    // easeOutBack
    const c1 = 1.70158, c3 = c1 + 1;
    const s = 1 + c3 * Math.pow(prog - 1, 3) + c1 * Math.pow(prog - 1, 2);
    mesh.scale.set(s, s, s);
    if (prog < 1) requestAnimationFrame(growAnim);
    else {
      mesh.scale.set(1, 1, 1);
      startFloatAnim(mesh, wy);
    }
  }
  requestAnimationFrame(growAnim);

  // Mantém referência para limpeza no playAgain
  mesh.userData.isGeoWord = true;
}

function startFloatAnim(mesh, baseY) {
  const amp = 0.04;
  const speed = 0.0012;
  const phase = Math.random() * Math.PI * 2; // fase aleatória por palavra
  const tStart = performance.now();

  function loop(t) {
    if (!mesh.parent) return; // foi removido
    const elapsed = t - tStart;
    mesh.position.y = baseY + Math.sin(elapsed * speed + phase) * amp;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

function updateGeoLighting() {
  const total = geoPanels.length;
  const destroyed = geoPanels.filter(p => !p.alive).length;
  const progress = total > 0 ? destroyed / total : 0;

  // Luz ambiente: aumenta levemente conforme painéis são destruídos
  const intensity = (0.9 + progress * 0.4).toFixed(2);
  document.getElementById('geo-ambient').setAttribute('light', `type: ambient; color: #d4c4a8; intensity: ${intensity}`);
}

// ===== END GAME =====
function endGame() {
  stopGame();
  hideAllScreens();

  $('result-score-value').textContent = score + ' pts';
  $('result-detail').textContent = `${geoWordsRevealed} barreira${geoWordsRevealed !== 1 ? 's' : ''} quebrada${geoWordsRevealed !== 1 ? 's' : ''}`;
  lastResult = { game: 'geo', score, time: 40 };
  pushScoreToPending('geo', score, geoWordsRevealed);
  resultScreen.classList.add('active');

  // Narração 3 — só áudio, sem legendas
  _playAudio(_aud3, null);
}

function playAgain() {
  hideAllScreens();
  beginPhase1();
}

// ===== RANKING SYSTEM =====
function getRanking(game) {
  const key = 'presenca_ranking_' + game;
  try {
    return JSON.parse(localStorage.getItem(key)) || [];
  } catch { return []; }
}

function saveRanking(game, entry) {
  const key = 'presenca_ranking_' + game;
  const ranking = getRanking(game);
  ranking.push(entry);
  // Sort: highest score first, then lowest time
  ranking.sort((a, b) => b.score - a.score || a.time - b.time);
  // Keep top 50
  localStorage.setItem(key, JSON.stringify(ranking.slice(0, 50)));
}

function saveAndShowRanking() {
  const name = $('player-name').value.trim();
  const phone = $('player-phone').value.trim();

  if (!name) { $('player-name').style.borderColor = '#ff4444'; return; }
  if (!phone) { $('player-phone').style.borderColor = '#ff4444'; return; }

  saveRanking(lastResult.game, {
    name,
    phone,
    score: lastResult.score,
    time: lastResult.time,
    date: new Date().toISOString()
  });

  resultScreen.classList.remove('active');
  showRanking();
}

function showRanking() {
  hideAllScreens();
  rankingScreen.classList.add('active');
  renderRankingTab();
}

function renderRankingTab() {
  const ranking = getRanking('geo');
  const table = $('ranking-table');

  // Keep header, remove data rows
  const rows = table.querySelectorAll('.ranking-row:not(.header)');
  rows.forEach(r => r.remove());

  if (ranking.length === 0) {
    const row = document.createElement('div');
    row.className = 'ranking-row';
    row.innerHTML = '<div style="color:#666;width:100%;text-align:center;">Nenhum registro ainda</div>';
    table.appendChild(row);
    return;
  }

  ranking.slice(0, 10).forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'ranking-row';
    row.innerHTML = `
      <div class="ranking-pos">${i + 1}</div>
      <div class="ranking-name">${escapeHtml(entry.name)}</div>
      <div class="ranking-score">${entry.score}</div>
      <div class="ranking-time">${entry.time}s</div>
    `;
    table.appendChild(row);
  });
}

function closeRanking() {
  rankingScreen.classList.remove('active');
  mainMenu.classList.remove('hidden');
}

function exportCSV() {
  let csv = 'Jogo,Posicao,Nome,Telefone,Pontuacao,Tempo(s),Data\n';
  const ranking = getRanking('geo');
  ranking.forEach((entry, i) => {
    csv += `Geode Presença,${i + 1},"${entry.name}","${entry.phone || ''}",${entry.score},${entry.time},"${entry.date}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `presenca_ranking_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== VR ESTÉREO MANUAL (Cardboard / Shinecon) =====
let _stereoActive = false;
let _stereoCamera = null;
let _origRender   = null;
let _stereoSize   = new THREE.Vector2();

// ===== VR MIRROR — espelha overlay para o olho direito =====
let _vrMirror            = null;
let _vrMirrorObserver    = null;
let _vrMirrorSyncPending = false;

function _createVRMirror() {
  const overlay = document.getElementById('overlay-layer');
  if (!overlay || _vrMirror) return;

  // Div que cobre a metade direita da tela (olho direito).
  // transform:translate(0) faz os filhos position:fixed usarem este div como
  // containing block, espelhando exatamente o layout do overlay-layer.
  _vrMirror = document.createElement('div');
  _vrMirror.id = 'vr-right-eye-overlay';
  _vrMirror.setAttribute('style', [
    'position:fixed', 'top:0', 'left:50%', 'width:50%', 'height:100%',
    'z-index:9999', 'pointer-events:none', 'overflow:hidden',
    'transform:translate(0,0)'
  ].join(';'));

  // Insere antes do #vr-ui para ficar sob os controles VR
  const vrUi = document.getElementById('vr-ui');
  document.body.insertBefore(_vrMirror, vrUi);

  // Sincroniza innerHTML — debounced a 1 frame para não sobrecarregar
  function doSync() {
    if (_vrMirror && overlay) _vrMirror.innerHTML = overlay.innerHTML;
    _vrMirrorSyncPending = false;
  }
  function scheduleSync() {
    if (_vrMirrorSyncPending) return;
    _vrMirrorSyncPending = true;
    requestAnimationFrame(doSync);
  }

  _vrMirrorObserver = new MutationObserver(scheduleSync);
  _vrMirrorObserver.observe(overlay, {
    childList: true, subtree: true,
    attributes: true, characterData: true
  });

  doSync(); // sync inicial
}

function _destroyVRMirror() {
  if (_vrMirrorObserver) { _vrMirrorObserver.disconnect(); _vrMirrorObserver = null; }
  if (_vrMirror)         { _vrMirror.remove(); _vrMirror = null; }
  _vrMirrorSyncPending = false;
}

function enterVR() {
  _stereoActive ? exitStereoVR() : enterStereoVR();
}

function enterStereoVR() {
  const scene    = document.querySelector('a-scene');
  const renderer = scene.renderer;

  // Fullscreen + landscape
  try { screen.orientation.lock('landscape-primary').catch(() => {}); } catch(e) {}
  try {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullscreen)?.call(el);
  } catch(e) {}

  document.body.classList.add('vr-mode');

  // Cria espelho do overlay para o olho direito
  _createVRMirror();

  // StereoCamera — 64mm separação ocular padrão Cardboard
  _stereoCamera = new THREE.StereoCamera();
  _stereoCamera.eyeSep = 0.064;

  // Intercepta renderer.render — renderiza cada olho na sua metade da tela
  _origRender = renderer.render.bind(renderer);
  renderer.render = function(sceneObj, camera) {
    if (!_stereoActive) { _origRender(sceneObj, camera); return; }

    _stereoCamera.update(camera);
    renderer.getSize(_stereoSize);
    const w2 = Math.floor(_stereoSize.width / 2);
    const h  = _stereoSize.height;

    const prevAutoClear = renderer.autoClear;
    renderer.autoClear = false;
    renderer.setScissorTest(true);

    // Olho esquerdo — metade esquerda da tela
    renderer.setViewport(0, 0, w2, h);
    renderer.setScissor(0, 0, w2, h);
    renderer.clear();
    _origRender(sceneObj, _stereoCamera.cameraL);

    // Olho direito — metade direita da tela
    renderer.setViewport(w2, 0, w2, h);
    renderer.setScissor(w2, 0, w2, h);
    renderer.clear();
    _origRender(sceneObj, _stereoCamera.cameraR);

    renderer.setScissorTest(false);
    renderer.autoClear = prevAutoClear;
  };

  _stereoActive = true;
}

function exitStereoVR() {
  if (!_stereoActive) return;
  const renderer = document.querySelector('a-scene').renderer;
  if (_origRender) { renderer.render = _origRender; _origRender = null; }

  _destroyVRMirror();

  _stereoCamera = null;
  _stereoActive = false;

  document.body.classList.remove('vr-mode');
  document.body.classList.remove('game-active');
  try { (document.exitFullscreen || document.webkitExitFullscreen)?.call(document); } catch(e) {}
  try { screen.orientation.unlock(); } catch(e) {}
}

function _vrUpdateHUD() {
  if (!_stereoActive) return;
  const s = document.getElementById('vr-hud-score');
  const t = document.getElementById('vr-hud-timer');
  if (s) s.textContent = score + ' pts';
  if (t) t.textContent = String(Math.floor(timeRemaining / 60)).padStart(2,'0') + ':' + String(timeRemaining % 60).padStart(2,'0');
}

// ===== UTILITIES =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== PHONE INPUT MASK =====
$('player-phone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 7) {
    v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  } else if (v.length > 2) {
    v = `(${v.slice(0,2)}) ${v.slice(2)}`;
  }
  e.target.value = v;
});

// Reset border on input focus
$('player-name').addEventListener('focus', function() { this.style.borderColor = 'rgba(255,139,26,0.4)'; });
$('player-phone').addEventListener('focus', function() { this.style.borderColor = 'rgba(255,139,26,0.4)'; });
