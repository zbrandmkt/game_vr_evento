<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Presenca VR - Game Stand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/dseg7-classic" rel="stylesheet">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- Firebase SDK v12 (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    const app = initializeApp({
      apiKey: "AIzaSyALkBD0Zd6uUDDX-mVm2mxI24eCEGBE6gs",
      authDomain: "presenca-game-stand.firebaseapp.com",
      databaseURL: "https://presenca-game-stand-default-rtdb.firebaseio.com",
      projectId: "presenca-game-stand",
      storageBucket: "presenca-game-stand.firebasestorage.app",
      messagingSenderId: "397975465714",
      appId: "1:397975465714:web:8d3c29cd70a7fa46c2aa6b"
    });
    const db = getDatabase(app);
    window._fb = { db, ref, push };
    console.log('[Firebase] VR game conectado.');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0A0A0A;
      color: #fff;
      overflow: hidden;
      touch-action: none;
    }

    /* A-Frame scene always behind everything */
    a-scene { z-index: 0 !important; }

    /* ===== OVERLAY LAYER ===== */
    #overlay-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; pointer-events: none;
    }
    #overlay-layer > div,
    #overlay-layer > button { pointer-events: auto; }

    /* ===== MAIN MENU ===== */
    #main-menu {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000;
      pointer-events: none; /* deixa o A-Frame receber eventos de giroscópio */
    }
    #main-menu.hidden { display: none; }
    /* só os filhos diretos recebem cliques */
    #main-menu > * { pointer-events: auto; }

    .menu-logo {
      filter: drop-shadow(0 0 24px rgba(255,139,26,0.5));
      animation: logoFloat 4s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    .menu-subtitle {
      font-size: 13px; color: rgba(255,255,255,0.55);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 48px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .menu-btn {
      display: block; width: 260px; padding: 20px 24px; margin: 10px auto;
      background: linear-gradient(135deg, #FF8B1A 0%, #F05100 100%);
      border: none; border-radius: 16px; color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 20px; font-weight: 800; cursor: pointer;
      text-align: center;
      letter-spacing: 1px;
      box-shadow: 0 8px 32px rgba(240,81,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .menu-btn:hover, .menu-btn:active {
      transform: scale(1.06);
      box-shadow: 0 12px 48px rgba(255,139,26,0.7), 0 2px 8px rgba(0,0,0,0.4);
    }

    .menu-footer {
      position: absolute; bottom: 28px; text-align: center;
      font-size: 11px; color: #ffffff;
      letter-spacing: 1px;
    }
    .menu-footer span { color: #FF8B1A; }

    #back-menu-btn {
      position: fixed; top: 10px; left: 10px; z-index: 10001;
      background: rgba(255,255,255,0.15); border: none; border-radius: 8px;
      color: #fff; padding: 8px 14px; font-size: 12px; font-weight: 700;
      cursor: pointer; display: none;
    }

    /* ===== INTRO OVERLAY ===== */
    #intro-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 10002; text-align: center; padding: 20px;
    }
    #intro-overlay.active { display: flex; }
    #intro-countdown {
      font-size: 96px; font-weight: 900; color: #fff;
      text-shadow: 0 0 40px rgba(255,139,26,0.8), 0 0 80px rgba(255,139,26,0.4);
      min-height: 120px; line-height: 1;
    }
    #intro-text { display: none; }

    /* ===== HUD ===== */
    #game-hud {
      position: fixed; top: 0; left: 0; width: 100%;
      z-index: 9998; display: none;
      flex-direction: column; align-items: center;
      pointer-events: none; padding-top: 18px;
    }
    #game-hud.active { display: flex; }

    /* Timer - DSEG7 digital font, neon orange */
    #hud-timer {
      font-family: 'DSEG7 Classic', 'Courier New', monospace;
      font-size: 52px; font-weight: 700;
      color: #FF8B1A;
      text-shadow:
        0 0 6px #FF8B1A,
        0 0 12px #FF8B1A,
        0 0 25px rgba(255,139,26,0.7),
        0 0 50px rgba(255,139,26,0.3);
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 8px;
    }

    /* Lives - below timer, no background */
    #hud-center-info {
      font-size: 24px;
      line-height: 1;
      margin-bottom: 4px;
    }

    /* Score - bottom center, neon orange */
    #hud-score {
      display: none;
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-family: 'Poppins', sans-serif;
      font-size: 28px; font-weight: 700;
      color: #FF8B1A;
      text-shadow:
        0 0 8px #FF8B1A,
        0 0 20px rgba(255,139,26,0.6),
        0 0 40px rgba(255,139,26,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #hud-score.active { display: block; }

    .hud-progress {
      font-family: 'Poppins', sans-serif;
      color: #FFB800; font-size: 16px; font-weight: 600;
    }

    /* ===== TOUCH ZONE (Game 2 - tap to hit) ===== */
    #touch-hit-zone {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; z-index: 9996;
    }
    #touch-hit-zone.active { display: block; }

    /* ===== RESULT SCREEN ===== */
    #result-screen {

      background: rgba(0,0,0,0.95); display: none;

      z-index: 10003; text-align: center; padding: 20px; overflow-y: auto;
    }
    #result-screen.active { display: flex; }
    .result-title { font-size: 28px; font-weight: 900; color: #FF8B1A; margin-bottom: 5px; }
    .result-score { font-size: 48px; font-weight: 900; color: #fff; margin-bottom: 5px; }
    .result-detail { font-size: 14px; color: #888; margin-bottom: 20px; }
    .result-slogan { font-size: 13px; color: #FF8B1A; font-style: italic; margin-bottom: 20px; }

    .result-form { width: 100%; max-width: 300px; margin-bottom: 20px; }
    .result-form input {
      width: 100%; padding: 12px 16px; margin: 5px 0;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,139,26,0.4);
      border-radius: 8px; color: #fff; font-size: 16px; outline: none;
    }
    .result-form input::placeholder { color: #666; }
    .result-form input:focus { border-color: #FF8B1A; }

    .result-btn {
      display: inline-block; padding: 12px 24px; margin: 5px;
      background: linear-gradient(135deg, #FF8B1A 0%, #F05100 100%);
      border: none; border-radius: 8px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .result-btn.secondary {
      background: rgba(255,255,255,0.1);
    }

    /* ===== RANKING SCREEN ===== */
    #ranking-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.97); display: none;
      flex-direction: column; align-items: center;
      z-index: 10004; padding: 20px; overflow-y: auto;
    }
    #ranking-screen.active { display: flex; }
    .ranking-title { font-size: 24px; font-weight: 900; color: #FF8B1A; margin: 15px 0; }
    .ranking-table { width: 100%; max-width: 500px; }
    .ranking-row {
      display: flex; padding: 10px 12px; border-bottom: 1px solid #1a1a1a;
      align-items: center; font-size: 13px;
    }
    .ranking-row.header { color: #888; font-weight: 700; border-bottom: 1px solid #333; }
    .ranking-pos { width: 30px; color: #FF8B1A; font-weight: 700; }
    .ranking-name { flex: 1; }
    .ranking-score { width: 70px; text-align: right; color: #FF8B1A; font-weight: 700; }
    .ranking-time { width: 50px; text-align: right; color: #888; }

    .ranking-export {
      margin-top: 15px; padding: 10px 20px;
      background: rgba(255,255,255,0.1); border: 1px solid #333;
      border-radius: 8px; color: #888; cursor: pointer; font-size: 12px;
    }
    .ranking-close {
      margin-top: 10px; padding: 10px 24px;
      background: #FF8B1A; border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-size: 14px; font-weight: 700;
    }

    /* ===== CROSSHAIR ===== */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9997; pointer-events: none; display: none;
      transition: transform 0.1s;
    }
    #crosshair.active { display: block; }
    #crosshair.on-target { transform: translate(-50%, -50%) scale(1.35); }
    #crosshair.on-target .ch-ring { stroke: #FF8B1A; opacity: 1; }
    #crosshair.on-target .ch-line { stroke: #FF8B1A; }
    #crosshair.on-target .ch-dot  { fill: #FF8B1A; }

    /* ===== NARRATION SUBTITLE ===== */
    #narration-sub {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      z-index: 10005; text-align: center;
      font-size: 18px; font-weight: 600; color: #fff;
      text-shadow: 0 2px 16px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,0.9);
      max-width: 82%; line-height: 1.65;
      pointer-events: none; display: none; letter-spacing: 0.3px;
    }
    #narration-sub.active { display: block; }

    /* ===== GAME 2 HIT FEEDBACK ===== */
    #hit-feedback {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 9997; pointer-events: none; display: none;
      font-size: 48px; font-weight: 900; color: #FFB800;
      text-shadow: 0 0 30px rgba(255,184,0,0.8);
    }

    /* Hide A-Frame UI */
    .a-enter-vr { display: none !important; }

    /* ===== VR ENTER BUTTON ===== */
    #vr-enter-btn {
      position: fixed; bottom: 15px; right: 15px; z-index: 10001;
      background: linear-gradient(135deg, #FF8B1A, #F05100);
      border: none; border-radius: 50%; width: 50px; height: 50px;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 20px;
    }
  </style>
</head>
<body>

<!-- ===== OVERLAY LAYER ===== -->
<div id="overlay-layer">

<!-- ===== A-FRAME SCENE ===== -->
<a-scene
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="antialias: false; alpha: false"
  fog="type: exponential; color: #0A0A0A; density: 0"

  style="position:fixed;top:0;left:0;width:100%;height:100%;">

  <!-- ===== ASSETS ===== -->
  <a-assets>

  <!-- ===== CAMERA RIG ===== -->
  <a-entity id="camera-rig" position="0 0 0">

      id="main-camera"
      position="0 1.6 0"

        id="picareta-fp"
        src="#picareta-model"
        position="0.55 -0.72 -0.45"
        rotation="20 180 -18"
        scale="0.22 0.22 0.22"

<script>
// ===================================================================
// PRESENCA VR GAME - COMPLETE GAME LOGIC
// ===================================================================

// ===== DEFORMED ROCK COMPONENT =====
AFRAME.registerComponent('deformed-rock', {
  schema: {
    seed:       { type: 'int',    default: 42 },
    radius:     { type: 'number', default: 0.38 },
    difficulty: { type: 'int',    default: 2 }   // 2=easy 3=med 4=hard
  },
  init: function() {
    const { seed, radius, difficulty } = this.data;
    let s = seed;
    function rnd() { s = (s * 9301 + 49297) % 233280; return s / 233280; }

    const geo = new THREE.SphereGeometry(radius, 10, 8);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const f = radius * 0.42;
      pos.setX(i, pos.getX(i) + (rnd()-0.5)*f);
      pos.setY(i, pos.getY(i) + (rnd()-0.5)*f*0.75);
      pos.setZ(i, pos.getZ(i) + (rnd()-0.5)*f);
    }
    geo.computeVertexNormals();

    const colMap = { 2: 0x7A6548, 3: 0x5E4530, 4: 0x4A2E18 };
    const mat = new THREE.MeshStandardMaterial({
      color: colMap[difficulty] || 0x7A6548,
      roughness: 0.92, metalness: 0.06, flatShading: true
    });
    this.el.setObject3D('rock', new THREE.Mesh(geo, mat));

    // Hard rocks glow orange-red
    if (difficulty >= 3) {
      const glowEl = document.createElement('a-light');
      glowEl.setAttribute('type', 'point');
      glowEl.setAttribute('color', difficulty === 4 ? '#FF3300' : '#FF6600');
      glowEl.setAttribute('intensity', '0.35');
      glowEl.setAttribute('distance', '1.8');
      this.el.appendChild(glowEl);
    }
  },
  shake: function() {
    const orig = this.el.object3D.position.clone();
    let n = 0;
    const iv = setInterval(() => {
      this.el.object3D.position.set(
        orig.x + (Math.random()-0.5)*0.1,
        orig.y + (Math.random()-0.5)*0.06,
        orig.z + (Math.random()-0.5)*0.1
      );
      if (++n >= 7) { clearInterval(iv); this.el.object3D.position.copy(orig); }
    }, 28);
  }
});

// ===== STAR FIELD COMPONENT =====
AFRAME.registerComponent('star-field', {
  init: function() {
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    for (let i = 0; i < 400; i++) {
      vertices.push(
        (Math.random() - 0.5) * 40,
        Math.random() * 15 + 2,
        (Math.random() - 0.5) * 40
      );
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, sizeAttenuation: true });
    const stars = new THREE.Points(geometry, material);
    this.el.setObject3D('stars', stars);
  }
});

// ===== FIREBASE PUSH =====
function pushScoreToPending(gameType, scoreValue, timeUsed) {
  const fb = window._fb;
  if (!fb) { console.warn('[Firebase] Não iniciado ainda.'); return; }
  const entry = { game: gameType, score: scoreValue, time: timeUsed, date: new Date().toISOString() };
  fb.push(fb.ref(fb.db, 'pending'), entry)
    .then(() => console.log('[Firebase] Score enviado para promotor.'))
    .catch(e => console.error('[Firebase] Erro:', e));
}

// ===== ROCK DEFINITIONS (9 barreiras em 360°) =====
const ROCK_RADIUS = 3.0;
const ROCK_DEFS = [
  { word: "Link\nAutocontratação",         angle: 0,   h: 1.60, hits: 3, pts: 200 },
  { word: "Teimosinha",                     angle: 40,  h: 1.40, hits: 2, pts: 100 },
  { word: "Averba já",                      angle: 80,  h: 1.80, hits: 2, pts: 100 },
  { word: "Consulta em lote",               angle: 130, h: 1.50, hits: 3, pts: 200 },
  { word: "Disparo no\nWhatsapp",           angle: 175, h: 1.70, hits: 2, pts: 100 },
  { word: "Vitor.ia\nIA de Elegibilidade", angle: 220, h: 1.45, hits: 4, pts: 350 },
  { word: "Melhores comissões",             angle: 265, h: 1.60, hits: 2, pts: 100 },
  { word: "Maior range\nde idade",          angle: 305, h: 1.75, hits: 3, pts: 200 },
  { word: "CNAEs ilimitados",               angle: 345, h: 1.55, hits: 4, pts: 350 },
];

// ===== GAME STATE =====
let currentGame = 'clt';
let gameActive  = false;
let gameTimer   = null;
let timeRemaining = 40;
let score = 0;
let rocks = [];
let rocksDestroyed = 0;
const totalRocks = ROCK_DEFS.length;
let completionTime = null;
let gazeTarget = null;
let nodDetectionRAF = null;
let gazingRAF = null;
let lastResult = { game: null, score: 0, time: 0 };

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const mainMenu      = $('main-menu');
const introOverlay  = $('intro-overlay');
const introCountdown= $('intro-countdown');
const gameHud       = $('game-hud');
const hudScore      = $('hud-score');
const hudTimer      = $('hud-timer');
const hudCenter     = $('hud-center-info');
const touchHitZone  = $('touch-hit-zone');
const hitFeedback   = $('hit-feedback');
const resultScreen  = $('result-screen');
const rankingScreen = $('ranking-screen');
const backMenuBtn   = $('back-menu-btn');
const vrEnterBtn    = $('vr-enter-btn');
const crosshairEl   = $('crosshair');
const narrationSub  = $('narration-sub');
const game2World    = $('game2-world');

// ===== MENU FUNCTIONS =====
function startGame() {
  // Request iOS gyroscope permission FIRST (must be from user gesture)
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          // Re-enable look-controls after permission granted
          const cam = document.getElementById('main-camera');
          cam.setAttribute('look-controls', 'pointerLockEnabled: false; magicWindowTrackingEnabled: true; touchEnabled: true');
        }
      })
      .catch(err => console.warn('Gyro permission error:', err))
      .finally(() => _doStartGame());
  } else {
    _doStartGame();
  }
}

function _doStartGame() {
  currentGame = 'clt';
  mainMenu.classList.add('hidden');
  backMenuBtn.style.display = 'block';
  vrEnterBtn.style.display = 'flex';
  showIntro();
}

function backToMenu() {
  stopGame();
  hideAllScreens();
  mainMenu.classList.remove('hidden');
  backMenuBtn.style.display = 'none';
  vrEnterBtn.style.display = 'none';
  // Mantém caverna visível no menu — ambiente sempre ativo
  game2World.setAttribute('visible', true);
  document.getElementById('game-sky').setAttribute('visible', true);
  document.getElementById('game-sky').setAttribute('src', '#skybox-cave');
  document.getElementById('shared-env').setAttribute('visible', false);
}

function hideAllScreens() {
  introOverlay.classList.remove('active');
  gameHud.classList.remove('active');
  hudScore.classList.remove('active');
  crosshairEl.classList.remove('active');
  narrationSub.classList.remove('active');
  narrationSub.textContent = '';
  $('picareta-fp').setAttribute('visible', false);
  touchHitZone.classList.remove('active');
  resultScreen.classList.remove('active');
  rankingScreen.classList.remove('active');
}

// ===== INTRO: narração + legenda word-by-word + countdown =====
function showIntro() {
  hideAllScreens();
  introCountdown.textContent = '';

  const NARRATION = "O mercado consignado está preso em velhas barreiras... Você tem 40 segundos para quebrá-las e descobrir que o Futuro é com Presença.";
  const words = NARRATION.split(' ');
  const WORD_INTERVAL = 520; // ms por palavra

  narrationSub.classList.add('active');
  narrationSub.textContent = '';

  let countdownStarted = false;
  function doCountdown() {
    if (countdownStarted) return;
    countdownStarted = true;
    narrationSub.classList.remove('active');
    introOverlay.classList.add('active');
    let count = 3;
    introCountdown.textContent = count;
    const ci = setInterval(() => {
      count--;
      if (count > 0) {
        introCountdown.textContent = count;
      } else {
        clearInterval(ci);
        introOverlay.classList.remove('active');
        beginGame();
      }
    }, 1000);
  }

  // Reveal words progressively
  let idx = 0;
  const wordTimer = setInterval(() => {
    idx++;
    narrationSub.textContent = words.slice(0, idx).join(' ');
    if (idx >= words.length) clearInterval(wordTimer);
  }, WORD_INTERVAL);

  // Narration audio
  const audio = new Audio('assets/narra\u00e7\u00e3o.mp3');
  audio.addEventListener('ended', () => setTimeout(doCountdown, 700));
  audio.play().catch(() => {
    // Sem áudio: countdown depois das palavras + pausa
    setTimeout(doCountdown, words.length * WORD_INTERVAL + 1200);
  });
  // Segurança: máximo 25s
  setTimeout(doCountdown, 25000);
}

// ===== BEGIN GAME =====
function beginGame() {
  gameActive    = true;
  score         = 0;
  timeRemaining = 40;
  rocksDestroyed = 0;
  completionTime = null;
  gazeTarget    = null;

  gameHud.classList.add('active');
  hudScore.classList.add('active');
  updateHUD();
  beginCLTOuro();

  gameTimer = setInterval(() => {
    timeRemaining--;
    updateHUD();
    if (timeRemaining <= 0) endGame();
  }, 1000);
}

function stopGame() {
  gameActive = false;
  if (gameTimer)        { clearInterval(gameTimer); gameTimer = null; }
  if (nodDetectionRAF)  { cancelAnimationFrame(nodDetectionRAF); nodDetectionRAF = null; }
  if (gazingRAF)        { cancelAnimationFrame(gazingRAF); gazingRAF = null; }
}

// ===== HUD UPDATE =====
function updateHUD() {
  hudScore.textContent = score + ' pts';
  const mins = Math.floor(timeRemaining / 60);
  const secs = timeRemaining % 60;
  hudTimer.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
  hudCenter.innerHTML = `<span class="hud-progress">${rocksDestroyed}/${totalRocks} barreiras</span>`;
}

// ===== WEB AUDIO =====
let audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playHitSound() {
  ensureAudioCtx();
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(70, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.35, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}
function playShatterSound() {
  ensureAudioCtx();
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*0.45), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 1.2);
  const src = audioCtx.createBufferSource(), filt = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
  filt.type = 'bandpass'; filt.frequency.value = 900; filt.Q.value = 0.6;
  g.gain.setValueAtTime(0.9, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
  src.buffer = buf; src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + 0.45);
}
function playWhooshSound() {
  ensureAudioCtx();
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(500, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.25);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  osc.start(); osc.stop(audioCtx.currentTime + 0.35);
}

// ===== GAME 2: QUEBRA AS BARREIRAS =====
function beginCLTOuro() {
  game2World.setAttribute('visible', true);
  document.getElementById('game-sky').setAttribute('visible', true);
  document.getElementById('game-sky').setAttribute('src', '#skybox-cave');
  document.getElementById('shared-env').setAttribute('visible', false);
  touchHitZone.classList.add('active');
  crosshairEl.classList.add('active');

  const picareta = $('picareta-fp');
  picareta.setAttribute('visible', true);
  picareta.setAttribute('animation-mixer', 'clip: Cubo.001Action; loop: repeat; timeScale: 0.5');

  spawnRocks();
  startGazeLoop();
  startNodDetection();
  updateHUD();
}

function spawnRocks() {
  const container = $('rock-container');
  while (container.firstChild) container.removeChild(container.firstChild);
  rocks = [];

  ROCK_DEFS.forEach((def, i) => {
    const rad = def.angle * Math.PI / 180;
    const x = parseFloat((Math.sin(rad) * ROCK_RADIUS).toFixed(3));
    const y = def.h;
    const z = parseFloat((-Math.cos(rad) * ROCK_RADIUS).toFixed(3));

    const el = document.createElement('a-entity');
    el.setAttribute('deformed-rock', `seed: ${i*7+13}; radius: 0.40; difficulty: ${def.hits}`);
    el.setAttribute('position', `${x} ${y} ${z}`);
    container.appendChild(el);

    rocks.push({ el, def, hitsLeft: def.hits, alive: true, pos: {x, y, z} });
  });
}

// Gaze targeting — finds which rock the player is looking at
function startGazeLoop() {
  const camera = document.getElementById('main-camera');
  const GAZE_ANGLE = 0.28; // ~16° cone

  function loop() {
    if (!gameActive) return;
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.object3D.quaternion);
    const camPos = new THREE.Vector3();
    camera.object3D.getWorldPosition(camPos);

    let best = null, bestAngle = GAZE_ANGLE;
    rocks.forEach(rock => {
      if (!rock.alive) return;
      const toRock = new THREE.Vector3(
        rock.pos.x - camPos.x, rock.pos.y - camPos.y, rock.pos.z - camPos.z
      ).normalize();
      const angle = dir.angleTo(toRock);
      if (angle < bestAngle) { bestAngle = angle; best = rock; }
    });

    gazeTarget = best;
    if (best) crosshairEl.classList.add('on-target');
    else      crosshairEl.classList.remove('on-target');

    gazingRAF = requestAnimationFrame(loop);
  }
  gazingRAF = requestAnimationFrame(loop);
}

function swingPickaxe() {
  const p = $('picareta-fp');
  p.setAttribute('animation-mixer', 'clip: Cubo.001Action; loop: once; timeScale: 2.5; clampWhenFinished: true');
  p.addEventListener('animation-finished', function done() {
    p.removeEventListener('animation-finished', done);
    p.setAttribute('animation-mixer', 'clip: Cubo.001Action; loop: repeat; timeScale: 0.5');
  });
}

function registerHit(rock) {
  if (!gameActive || !rock || !rock.alive) return;
  swingPickaxe();
  rock.hitsLeft--;

  if (rock.hitsLeft <= 0) {
    shatterRock(rock);
  } else {
    playHitSound();
    const comp = rock.el.components['deformed-rock'];
    if (comp && comp.shake) comp.shake();
    showHitFeedback();
  }
}

function handleTouchHit() {
  const target = gazeTarget || rocks.find(r => r.alive);
  if (target) registerHit(target);
}

function showHitFeedback() {
  const texts = ['CRACK!', 'BAM!', 'POW!', 'TOCK!'];
  hitFeedback.textContent = texts[Math.floor(Math.random() * texts.length)];
  hitFeedback.style.display = 'block';
  hitFeedback.style.left = (38 + Math.random() * 24) + '%';
  hitFeedback.style.top  = (38 + Math.random() * 24) + '%';
  setTimeout(() => { hitFeedback.style.display = 'none'; }, 180);
}

function shatterRock(rock) {
  rock.alive = false;
  rocksDestroyed++;
  const p = rock.pos;
  const outX = p.x / ROCK_RADIUS, outZ = p.z / ROCK_RADIUS;
  const scene = document.querySelector('a-scene');

  // Spawn 8 fragments flying outward
  for (let i = 0; i < 8; i++) {
    const frag = document.createElement('a-box');
    const sz = (0.04 + Math.random() * 0.08).toFixed(3);
    const fx = (p.x + outX*(0.6+Math.random()*1.2) + (Math.random()-0.5)*0.7).toFixed(2);
    const fy = (p.y + Math.random()*1.1 - 0.1).toFixed(2);
    const fz = (p.z + outZ*(0.6+Math.random()*1.2) + (Math.random()-0.5)*0.7).toFixed(2);
    const rx = Math.floor(Math.random()*360), ry = Math.floor(Math.random()*360);
    frag.setAttribute('width', sz); frag.setAttribute('height', sz); frag.setAttribute('depth', sz);
    frag.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
    frag.setAttribute('material', 'color: #7A6548; roughness: 0.9; transparent: true; opacity: 1');
    frag.setAttribute('animation__fly',    `property: position; to: ${fx} ${fy} ${fz}; dur: 580; easing: easeOutQuad`);
    frag.setAttribute('animation__rot',    `property: rotation; to: ${rx} ${ry} 0; dur: 580`);
    frag.setAttribute('animation__fade',   `property: material.opacity; to: 0; dur: 480; delay: 100; easing: easeInQuad`);
    scene.appendChild(frag);
    setTimeout(() => { if (frag.parentNode) frag.parentNode.removeChild(frag); }, 650);
  }

  // Remove rock entity
  if (rock.el.parentNode) rock.el.parentNode.removeChild(rock.el);

  // Reveal word — flies from rock position outward
  revealWord(rock);
  playShatterSound();

  // Score: pts + time bonus
  score += rock.def.pts;
  if (timeRemaining > 20) score += 50;
  else if (timeRemaining > 10) score += 25;

  if (rocksDestroyed >= totalRocks) {
    completionTime = 40 - timeRemaining;
    stopGame();
    setTimeout(() => endGame(), 1600);
    return;
  }
  updateHUD();
}

function revealWord(rock) {
  const p   = rock.pos;
  const outX = p.x / ROCK_RADIUS, outZ = p.z / ROCK_RADIUS;
  const endX = (p.x + outX * 1.4).toFixed(2);
  const endY = (p.y + 1.1).toFixed(2);
  const endZ = (p.z + outZ * 1.4).toFixed(2);
  const rotY = (180 - rock.def.angle);

  const txt = document.createElement('a-text');
  txt.setAttribute('value', rock.def.word);
  txt.setAttribute('position', `${p.x.toFixed(2)} ${p.y.toFixed(2)} ${p.z.toFixed(2)}`);
  txt.setAttribute('rotation', `0 ${rotY} 0`);
  txt.setAttribute('align', 'center');
  txt.setAttribute('color', '#FF8B1A');
  txt.setAttribute('width', '2.8');
  txt.setAttribute('opacity', '0');
  txt.setAttribute('font', 'mozillavr');
  txt.setAttribute('animation__fly',     `property: position; to: ${endX} ${endY} ${endZ}; dur: 650; easing: easeOutBack`);
  txt.setAttribute('animation__opacity', `property: text.opacity; from: 0; to: 1; dur: 400; delay: 80; easing: easeInQuad`);
  document.querySelector('a-scene').appendChild(txt);
  playWhooshSound();
}

// Nod detection — hits the currently gazed rock
function startNodDetection() {
  const camera = document.getElementById('main-camera');
  let lastNodTime = 0;
  const COOLDOWN_MS    = 380;
  const NOD_THRESHOLD  = 0.44;
  const REST_THRESHOLD = 0.17;
  let wasResting = true;

  function checkNod() {
    if (!gameActive) return;
    const pitch = camera.object3D.rotation.x;
    if (wasResting && pitch < -NOD_THRESHOLD) {
      const now = Date.now();
      if (now - lastNodTime > COOLDOWN_MS) {
        const target = gazeTarget || rocks.find(r => r.alive);
        if (target) registerHit(target);
        lastNodTime = now;
        wasResting  = false;
      }
    }
    if (pitch > -REST_THRESHOLD) wasResting = true;
    nodDetectionRAF = requestAnimationFrame(checkNod);
  }
  nodDetectionRAF = requestAnimationFrame(checkNod);
}

// ===== END GAME =====
function endGame() {
  stopGame();
  hideAllScreens();

  if (completionTime !== null) {
    // Todas barreiras destruídas — bônus de conclusão
    const bonus = Math.round(score * 0.5) + (40 - completionTime) * 20;
    const finalScore = score + bonus;
    $('result-title').textContent = '🏆 Barreiras Destruídas!';
    $('result-score-value').textContent = finalScore + ' pts';
    $('result-detail').textContent = `Todas as ${totalRocks} barreiras em ${completionTime}s! +${bonus} bônus`;
    lastResult = { game: 'clt', score: finalScore, time: completionTime };
    pushScoreToPending('clt', finalScore, completionTime);
  } else {
    $('result-title').textContent = 'Tempo Esgotado!';
    $('result-score-value').textContent = score + ' pts';
    $('result-detail').textContent = `${rocksDestroyed} de ${totalRocks} barreiras reveladas em 40s`;
    lastResult = { game: 'clt', score, time: 40 };
    pushScoreToPending('clt', score, 40);
  }

  resultScreen.classList.add('active');
  $('player-name').value = '';
  $('player-phone').value = '';
}

function playAgain() {
  hideAllScreens();
  showIntro();
}

// ===== RANKING SYSTEM =====
function getRanking(game) {
  const key = 'presenca_ranking_' + game;
  try {
    return JSON.parse(localStorage.getItem(key)) || [];
  } catch { return []; }
}

function saveRanking(game, entry) {
  const key = 'presenca_ranking_' + game;
  const ranking = getRanking(game);
  ranking.push(entry);
  // Sort: highest score first, then lowest time
  ranking.sort((a, b) => b.score - a.score || a.time - b.time);
  // Keep top 50
  localStorage.setItem(key, JSON.stringify(ranking.slice(0, 50)));
}

function saveAndShowRanking() {
  const name = $('player-name').value.trim();
  const phone = $('player-phone').value.trim();

  if (!name) { $('player-name').style.borderColor = '#ff4444'; return; }
  if (!phone) { $('player-phone').style.borderColor = '#ff4444'; return; }

  saveRanking(lastResult.game, {
    name,
    phone,
    score: lastResult.score,
    time: lastResult.time,
    date: new Date().toISOString()
  });

  resultScreen.classList.remove('active');
  showRanking();
}

function showRanking() {
  hideAllScreens();
  rankingScreen.classList.add('active');
  renderRankingTab();
}

function renderRankingTab() {
  const ranking = getRanking('clt');
  const table = $('ranking-table');

  // Keep header, remove data rows
  const rows = table.querySelectorAll('.ranking-row:not(.header)');
  rows.forEach(r => r.remove());

  if (ranking.length === 0) {
    const row = document.createElement('div');
    row.className = 'ranking-row';
    row.innerHTML = '<div style="color:#666;width:100%;text-align:center;">Nenhum registro ainda</div>';
    table.appendChild(row);
    return;
  }

  ranking.slice(0, 10).forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'ranking-row';
    row.innerHTML = `
      <div class="ranking-pos">${i + 1}</div>
      <div class="ranking-name">${escapeHtml(entry.name)}</div>
      <div class="ranking-score">${entry.score}</div>
      <div class="ranking-time">${entry.time}s</div>
    `;
    table.appendChild(row);
  });
}

function closeRanking() {
  rankingScreen.classList.remove('active');
  mainMenu.classList.remove('hidden');
}

function exportCSV() {
  let csv = 'Jogo,Posicao,Nome,Telefone,Pontuacao,Tempo(s),Data\n';
  const ranking = getRanking('clt');
  ranking.forEach((entry, i) => {
    csv += `CLT e Ouro,${i + 1},"${entry.name}","${entry.phone || ''}",${entry.score},${entry.time},"${entry.date}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `presenca_ranking_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== VR =====
function enterVR() {
  const scene = document.querySelector('a-scene');
  if (scene.is('vr-mode')) {
    scene.exitVR();
  } else {
    scene.enterVR();
  }
}

// ===== UTILITIES =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== PHONE INPUT MASK =====
$('player-phone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 7) {
    v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  } else if (v.length > 2) {
    v = `(${v.slice(0,2)}) ${v.slice(2)}`;
  }
  e.target.value = v;
});

// Reset border on input focus
$('player-name').addEventListener('focus', function() { this.style.borderColor = 'rgba(255,139,26,0.4)'; });
$('player-phone').addEventListener('focus', function() { this.style.borderColor = 'rgba(255,139,26,0.4)'; });

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  // Show main menu
  mainMenu.classList.remove('hidden');
});
